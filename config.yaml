baseURL: https://lixiang.dev
languageCode: en-us
defaultContentLanguage: en
title: LIX
services:
  googleAnalytics:
    ID: G-TYYMZPT8H6
  # Comment before using giscus
  # disqus:
    # shortname: dev-lixiang


outputs:
home:
- html
- json
- rss

taxonomies:
  tag: tags

permalinks:
  post: /:filename/

imaging:
  quality: 99

# To disable, set to an extremely large value, such as 999999
pagination:
  pagerSize: 5

# See the list of emoji shortcodes for available emoticons.
# https://gohugo.io/quick-reference/emojis/
enableEmoji: true

params:
  homeMetaContent: Welcome, yes welcome.
  # For more date formats see https://gohugo.io/functions/format/
  dateFormat: Jan 2, 2006
  navTitleLink: /
  # Uncomment to use giscus
  giscus:
    repo: "dev-lixiang/dev-lixiang.github.io"
    repoID: "R_kgDONGz1BQ"
    category: "General"
    categoryID: "DIC_kwDONGz1Bc4CjwYF"
    mapping: "title"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "https://lixiang.dev/css/giscus.css"
    lang: "en"
    loading: "lazy"
    crossorigin: "anonymous"

menu:
  nav:
    - name: Tags
      url: /tags/
      weight: 1
    - name: About
      url: /about/
      weight: 2
    - name: RSS
      url: /index.xml
      weight: 3

markup:
  tableOfContents:
    endLevel: 6
    ordered: false
    startLevel: 2
  defaultMarkdownHandler: goldmark
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      attribute: true
      autoHeadingID: true
    renderer:
      hardWraps: false
      unsafe: true
      xHTML: false
  # highlight:
  #   guessSyntax: false
  #   codeFences: true
  #   hl_Lines: ""
  #   lineNoStart: 0
  #   lineNos: false
  #   lineNumbersInTable: false
  #   noClasses: true
  #   style: manni
  #   tabWidth: 4
  tableOfContents:
    endLevel: 6
    startLevel: 2

# Uncomment to disable sitemap generation
# disableKinds:
# - sitemap
sitemap:
  # (string) How frequently a page is likely to change. Valid values are always, hourly, daily, weekly, monthly, yearly, and never
  changeFreq: "daily" 
  # (bool) Whether to disable page inclusion. Default is false. Set to true in front matter to exclude the page.
  disable: false
  # (string) The name of the generated file. Default is sitemap.xml.
  filename: sitemap.xml
  # (float) The priority of a page relative to any other page on the site. Valid values range from 0.0 to 1.0. With the default value of -1 Hugo will omit this field from the sitemap.
  priority: -1

# Override the default values for a given page in front matter.
# ---
# sitemap:
#   changefreq: weekly
#   disable: true
#   priority: 0.8
# title: News
# ---